name: vael
description: "Family finance app — local-first, zero-server, encrypted."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Database
  drift: ^2.27.0
  sqlite3_flutter_libs: ^0.6.0+eol
  sqlcipher_flutter_libs: ^0.7.0+eol

  # State management
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0

  # Crypto
  pointycastle: ^4.0.0
  flutter_secure_storage: ^10.0.0

  # Auth & sync
  google_sign_in: ^7.2.0
  googleapis: ^16.0.0
  googleapis_auth: ^2.0.0

  # Charts
  fl_chart: ^1.2.0

  # Typography
  google_fonts: ^8.0.2

  # Utilities
  uuid: ^4.5.1
  path_provider: ^2.1.5
  path: ^1.9.1
  collection: ^1.19.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  drift_dev: ^2.27.0
  build_runner: ^2.4.15
  riverpod_generator: ^4.0.0+1
  custom_lint: ^0.8.1
  riverpod_lint: ^3.1.0

  # Testing
  mockito: ^5.4.5

flutter:
  uses-material-design: true
